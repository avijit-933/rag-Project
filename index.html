<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice & Text RAG Chatbot</title>
<style>
  :root {
    --bg: #0F172A;
    --panel: #111B33;
    --bubble-bot: #1E293B;
    --bubble-user: #2563EB;
    --text: #E2E8F0;
    --text-dim: #64748B;
    --accent: #38BDF8;
    --border: #1F2C47;
    --danger: #F87171;
    --recording: #EF4444;
    --input-bg: #1E293B;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.6);
  }

  .logo-dot.thinking {
    animation: pulse 1.1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(56, 189, 248, 0); }
    100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.2px;
  }

  header span.status {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .row {
    display: flex;
    width: 100%;
  }

  .row.user { justify-content: flex-end; }
  .row.bot  { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .row.user .bubble {
    background: var(--bubble-user);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .row.bot .bubble {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    max-width: 320px;
    line-height: 1.6;
  }

  .empty-state strong {
    display: block;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 6px;
  }

  /* Modernized Chat Bar Interface Layout */
  .controls-panel {
    border-top: 1px solid var(--border);
    padding: 14px 20px 24px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-container {
    display: flex;
    align-items: flex-end;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 14px;
    gap: 8px;
  }

  .chat-textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14.5px;
    resize: none;
    max-height: 160px;
    height: 24px;
    line-height: 24px;
    font-family: inherit;
  }

  .action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s ease;
    background: transparent;
    color: var(--text);
  }

  .action-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.08);
  }

  .mic-btn {
    color: var(--accent);
  }

  .mic-btn.recording {
    background: var(--danger) !important;
    color: white;
    animation: pulseMic 1.4s infinite;
  }

  @keyframes pulseMic {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .send-btn {
    background: var(--accent);
    color: var(--bg);
  }

  .send-btn:disabled {
    background: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .hint-text {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  .error-banner {
    margin: 0 20px 8px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.35);
    color: var(--danger);
    font-size: 13px;
    display: none;
  }

  #messages::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-dot" id="statusDot"></div>
    <h1>Voice & Text Assistant</h1>
    <span class="status" id="connStatus">Ready</span>
  </header>

  <div class="error-banner" id="errorBanner"></div>

  <div id="messages">
    <div class="empty-state" id="emptyState">
      <strong>Talk or type to your context documents</strong>
      Ask questions using text or your microphone, and get instant responses printed and spoken out loud.
    </div>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <div class="controls-panel">
    <div class="input-container">
      <button class="action-btn mic-btn" id="micButton" title="Record Voice">🎤</button>
      <textarea class="chat-textarea" id="textInput" placeholder="Message assistant..." rows="1"></textarea>
      <button class="action-btn send-btn" id="sendButton" title="Send Message" disabled>➔</button>
    </div>
    <div class="hint-text" id="hintText">Type a message or tap mic to talk</div>
  </div>
</div>

<script>
const API_URL = "http://127.0.0.1:8000/chat"; 

const messagesEl = document.getElementById("messages");
const micButton = document.getElementById("micButton");
const sendButton = document.getElementById("sendButton");
const textInput = document.getElementById("textInput");
const hintText = document.getElementById("hintText");
const emptyState = document.getElementById("emptyState");
const statusDot = document.getElementById("statusDot");
const connStatus = document.getElementById("connStatus");
const errorBanner = document.getElementById("errorBanner");
const audioPlayer = document.getElementById("audioPlayer");

let isStreaming = false;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

// Auto-grow Textarea height
textInput.addEventListener("input", () => {
  textInput.style.height = "24px";
  textInput.style.height = textInput.scrollHeight + "px";
  sendButton.disabled = textInput.value.trim().length === 0;
});

// Send via Return Key (Enter) without Shift
textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (textInput.value.trim().length > 0 && !isStreaming) {
      sendTextMessage();
    }
  }
});

// Action Event Observers
sendButton.addEventListener("click", () => {
  if (!isStreaming) sendTextMessage();
});

micButton.addEventListener("click", async () => {
  if (isStreaming) return;
  if (!isRecording) {
    await startRecording();
  } else {
    stopRecording();
  }
});

async function startRecording() {
  audioChunks = [];
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    
    mediaRecorder.ondataavailable = (event) => {
      if (event.data.size > 0) audioChunks.push(event.data);
    };

    mediaRecorder.onstop = () => {
      sendPipelineRequest({ audioBlob: new Blob(audioChunks, { type: "audio/webm" }) });
    };

    mediaRecorder.start();
    isRecording = true;
    micButton.classList.add("recording");
    micButton.textContent = "⏹️";
    textInput.disabled = true;
    hintText.textContent = "Recording voice... click square to stop & submit.";
    clearError();
  } catch (err) {
    showError("Could not gain access to mic: " + err.message);
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
    isRecording = false;
    micButton.classList.remove("recording");
    micButton.textContent = "🎤";
    textInput.disabled = false;
    hintText.textContent = "Processing...";
  }
}

function sendTextMessage() {
  const text = textInput.value.trim();
  textInput.value = "";
  textInput.style.height = "24px";
  sendButton.disabled = true;
  sendPipelineRequest({ textInput: text });
}

async function sendPipelineRequest({ textInput = null, audioBlob = null }) {
  setStreamingState(true);
  clearError();

  const formData = new FormData();
  
  if (audioBlob) {
    addChatBubble("🎤 [Recording voice prompt...]", "user");
    formData.append("file", audioBlob, "query.webm");
  } else if (textInput) {
    addChatBubble(textInput, "user");
    formData.append("text_input", textInput);
  }

  // Placeholder message component representing response generation phase
  const botRow = addPlaceholderBubble("bot");

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    if (!response.ok) {
      throw new Error(`Server execution crash code: ${response.status}`);
    }

    const data = await response.json();
    
    // Update the frontend content dynamically with the final text string returned
    if (audioBlob && data.user_question) {
      const userBubbles = messagesEl.querySelectorAll(".row.user .bubble");
      if (userBubbles.length > 0) {
        userBubbles[userBubbles.length - 1].textContent = data.user_question;
      }
    }

    // Populate server text answer inside the placeholder bubble
    botRow.querySelector(".bubble").textContent = data.bot_response;
    scrollToBottom();

    // Fire audio synthesis play functionality
    if (data.audio_data) {
      audioPlayer.src = data.audio_data;
      audioPlayer.play().catch(e => {
        console.log("Audio playback blocked or interrupted:", e);
        setStreamingState(false);
      });
      audioPlayer.onended = () => setStreamingState(false);
    } else {
      setStreamingState(false);
    }

  } catch (err) {
    botRow.remove();
    showError(`Pipeline execution failed: ${err.message}`);
    setStreamingState(false);
  }
}

function addChatBubble(text, role) {
  hideEmptyState();
  const row = document.createElement("div");
  row.className = `row ${role}`;
  row.innerHTML = `<div class="bubble"></div>`;
  row.querySelector(".bubble").textContent = text;
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

function addPlaceholderBubble(role) {
  hideEmptyState();
  const row = document.createElement("div");
  row.className = `row ${role}`;
  row.innerHTML = `<div class="bubble" style="opacity: 0.6;">Thinking...</div>`;
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

function setStreamingState(active) {
  isStreaming = active;
  micButton.disabled = active;
  textInput.disabled = active;
  statusDot.classList.toggle("thinking", active);
  connStatus.textContent = active ? "Processing pipeline data…" : "Ready";
  if(!active) {
    hintText.textContent = "Type a message or tap mic to talk";
    textInput.focus();
  }
}

function hideEmptyState() { if (emptyState) emptyState.remove(); }
function showError(msg) { errorBanner.textContent = msg; errorBanner.style.display = "block"; }
function clearError() { errorBanner.style.display = "none"; }
function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
</script>

</body>
</html>
